<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>싸다구항공 ✈️ 딜 검문소</title>
<meta name="theme-color" content="#14b8a6">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{background:#eefbf8;-webkit-tap-highlight-color:transparent;}
  .card{box-shadow:0 6px 24px rgba(20,184,166,.10);}
  details>summary{list-style:none;cursor:pointer}
  details>summary::-webkit-details-marker{display:none}
</style>
</head>
<body class="text-slate-800">
<div class="max-w-md mx-auto px-4 pb-24">

  <!-- 헤더 -->
  <header class="pt-7 pb-3">
    <div class="flex items-center gap-2">
      <span class="text-2xl">✈️</span>
      <h1 class="text-xl font-extrabold tracking-tight">싸다구항공</h1>
      <span class="ml-1 text-[11px] font-semibold text-teal-700 bg-teal-100 rounded-full px-2 py-0.5">딜 검문소</span>
    </div>
    <p class="text-sm text-slate-500 mt-1">싸 보이는 가격보다, <b class="text-slate-700">잡아도 되는 이유</b>를 봅니다.</p>
  </header>

  <!-- 신뢰 안내 배너 -->
  <div class="bg-white/70 border border-teal-100 rounded-2xl p-3 text-[12px] text-slate-600 mb-4 leading-relaxed">
    🛡️ 결제·환불은 <b>항공사/판매처에서 직접</b> 진행돼요. 우리는 <b>검수된 딜만 골라</b> 보여주고, <b>예약 전 확인할 위험을 먼저</b> 알려드립니다.
  </div>

  <div id="sample-note" class="hidden text-[11px] text-amber-700 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 mb-4"></div>

  <div id="updated" class="text-[11px] text-slate-400 mb-2"></div>
  <div id="deals" class="space-y-4"></div>
  <div id="empty" class="hidden text-center text-slate-400 py-16">오늘 검수된 딜이 아직 없어요.</div>

  <footer class="text-center text-[11px] text-slate-400 mt-10 leading-relaxed">
    가격·수하물은 캐시/추정값이라 실제와 다를 수 있어요.<br>예약 전 결제화면에서 꼭 확인하세요. · 싸다구항공
  </footer>
</div>

<script>
const won = n => (n==null?'-':Number(n).toLocaleString('ko-KR')+'원');
const fatigueColor = f => ({'좋음':'text-teal-700 bg-teal-100','보통':'text-amber-700 bg-amber-100','나쁨':'text-rose-700 bg-rose-100'}[f]||'text-slate-600 bg-slate-100');
const gradeColor = g => (g==='A'?'bg-teal-600':g==='B'?'bg-teal-500':g==='C'?'bg-amber-500':g==='D'?'bg-rose-500':'bg-slate-400');

function report(id, kind){
  const log = JSON.parse(localStorage.getItem('reports')||'[]');
  log.push({id, kind, at:new Date().toISOString()});
  localStorage.setItem('reports', JSON.stringify(log));
  alert('신고 접수했어요. 감사합니다! 🙏\n(운영자가 확인 후 정정/마감 처리합니다)');
}

function card(d){
  const hc = d.hidden_cost||{};
  const insp = d.inspection||{};
  const disc = d.discount_rate;
  const discTxt = disc>0 ? `-${disc}%` : `${disc}%`;
  return `
  <div class="card bg-white rounded-3xl p-5">
    <div class="flex items-start justify-between">
      <div>
        <div class="text-[13px] text-slate-400 font-medium">${d.route} · ${d.airline}</div>
        <div class="text-lg font-extrabold">${d.badge||''} ${d.city}</div>
      </div>
      <span class="text-[11px] font-bold ${fatigueColor(d.fatigue)} rounded-full px-2 py-1 whitespace-nowrap">피로도 ${d.fatigue}</span>
    </div>

    <div class="flex items-end gap-2 mt-3">
      <div class="text-3xl font-black text-teal-600">${won(d.price)}</div>
      ${disc>0?`<span class="mb-1 text-[12px] font-bold text-rose-500 bg-rose-50 rounded-full px-2 py-0.5">${discTxt}</span>`:''}
    </div>
    <div class="text-[12px] text-slate-400 mt-0.5">평소가 <s>${won(d.normal_price)}</s> · ${d.transfers===0?'직항':'경유 '+d.transfers+'회'} · ${d.duration||''}</div>

    <div class="grid grid-cols-2 gap-x-3 gap-y-1 mt-3 text-[12.5px] text-slate-600">
      <div>🛫 ${d.departure_time||'-'}</div>
      <div>🛬 ${d.return_time||'-'}</div>
    </div>
    <div class="text-[12.5px] text-slate-600 mt-1">🧳 ${d.baggage_note||''}</div>

    <!-- 숨은비용 레이더 -->
    <details class="mt-3 bg-teal-50/60 rounded-2xl p-3">
      <summary class="text-[13px] font-bold text-teal-800">💰 숨은비용 레이더 — 예상 총여행비 ${won(hc.total_est)}</summary>
      <div class="mt-2 text-[12.5px] text-slate-600 space-y-0.5">
        <div class="flex justify-between"><span>항공권 표시가</span><b>${won(hc.airfare)}</b></div>
        <div class="flex justify-between"><span>위탁수하물(추정)</span><span>+${won(hc.baggage_est)}</span></div>
        <div class="flex justify-between"><span>eSIM</span><span>+${won(hc.esim)}</span></div>
        <div class="flex justify-between text-slate-400"><span>숙소</span><span>${hc.hotel_note||'별도'}</span></div>
        <div class="flex justify-between border-t border-teal-200 pt-1 mt-1 font-bold text-teal-800"><span>예상 총여행비</span><span>${won(hc.total_est)}</span></div>
      </div>
    </details>

    <!-- 추천 / 비추천 -->
    <div class="mt-3 grid grid-cols-1 gap-1.5 text-[12.5px]">
      <div class="text-teal-700">👍 추천: ${(d.fit_recommend||[]).join(', ')}</div>
      <div class="text-rose-600">👎 비추천: ${(d.fit_avoid||[]).join(', ')}</div>
    </div>

    <!-- 검수 영수증 -->
    <details class="mt-3 border border-slate-100 rounded-2xl p-3">
      <summary class="text-[13px] font-bold text-slate-700">🔎 검수 영수증
        <span class="ml-1 text-[11px] text-white ${gradeColor(d.booking_grade)} rounded-full px-2 py-0.5">예약처 ${d.booking_grade}</span>
      </summary>
      <div class="mt-2 text-[12.5px] text-slate-600 space-y-0.5">
        <div>확인 시각: ${insp.checked_at||'-'}</div>
        <div>가격 확인: ${insp.price_ok===true?'✅':insp.price_ok===false?'❌':'— (검수 예정)'}</div>
        <div>링크 확인: ${insp.link_ok===true?'✅':insp.link_ok===false?'❌':'— (검수 예정)'}</div>
        <div>환불/변경: ${insp.refund||'-'}</div>
      </div>
    </details>

    <!-- 액션 -->
    <div class="flex gap-2 mt-4">
      <a href="${d.affiliate_url}" target="_blank" rel="noopener"
         class="flex-1 text-center bg-teal-500 hover:bg-teal-600 text-white font-bold rounded-2xl py-3 text-sm">예약 보러가기 →</a>
      <details class="relative">
        <summary class="bg-slate-100 text-slate-500 rounded-2xl py-3 px-3 text-sm">⚠️</summary>
        <div class="absolute right-0 mt-1 bg-white card rounded-2xl p-2 z-10 w-40 text-[12.5px]">
          <div class="text-slate-400 px-1 pb-1">가격 바뀜 신고</div>
          <button onclick="report('${d.id}','price')" class="block w-full text-left px-2 py-1.5 hover:bg-slate-50 rounded">가격이 달라요</button>
          <button onclick="report('${d.id}','soldout')" class="block w-full text-left px-2 py-1.5 hover:bg-slate-50 rounded">마감됐어요</button>
          <button onclick="report('${d.id}','baggage')" class="block w-full text-left px-2 py-1.5 hover:bg-slate-50 rounded">수하물 조건 달라요</button>
          <button onclick="report('${d.id}','link')" class="block w-full text-left px-2 py-1.5 hover:bg-slate-50 rounded">링크가 이상해요</button>
        </div>
      </details>
    </div>
  </div>`;
}

fetch('published.json?'+Date.now()).then(r=>r.json()).then(data=>{
  const deals = data.deals||[];
  if(data.note){ const n=document.getElementById('sample-note'); n.textContent='ℹ️ '+data.note; n.classList.remove('hidden'); }
  if(data.updated_at){ document.getElementById('updated').textContent='업데이트: '+new Date(data.updated_at).toLocaleString('ko-KR'); }
  if(!deals.length){ document.getElementById('empty').classList.remove('hidden'); return; }
  document.getElementById('deals').innerHTML = deals.map(card).join('');
}).catch(e=>{ document.getElementById('empty').textContent='딜을 불러오지 못했어요.'; document.getElementById('empty').classList.remove('hidden'); });

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
</body>
</html>
